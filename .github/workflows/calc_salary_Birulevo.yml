name: Build Salary Calc Birulevo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt 6.7
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        cache: true
        set-env: true

    - name: Verify and fix Qt private headers
      shell: pwsh
      run: |
        $qtDir = $env:QT_ROOT_DIR
        Write-Host "QT_ROOT_DIR = $qtDir"
        $configFile = Get-ChildItem -Path "$qtDir\lib\cmake\Qt6GuiPrivate" -Filter "Qt6GuiPrivateConfig.cmake" -ErrorAction SilentlyContinue
        if ($configFile) {
          Write-Host "✅ Qt6GuiPrivate config found: $($configFile.FullName)"
        } else {
          Write-Host "❌ Qt6GuiPrivate not found — installing private headers manually..."
          pip install aqtinstall
          $outputDir = Split-Path (Split-Path $qtDir)
          Write-Host "Installing to: $outputDir"
          aqt install-qt windows desktop 6.7.0 win64_msvc2019_64 --outputdir "$outputDir"
          $configFile2 = Get-ChildItem -Path "$qtDir\lib\cmake\Qt6GuiPrivate" -Filter "Qt6GuiPrivateConfig.cmake" -ErrorAction SilentlyContinue
          if ($configFile2) {
            Write-Host "✅ Qt6GuiPrivate now available!"
          } else {
            Write-Host "Listing cmake directories:"
            Get-ChildItem "$qtDir\lib\cmake" -Directory | Where-Object { $_.Name -match "Private" } | ForEach-Object { Write-Host $_.Name }
          }
        }

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake project
      shell: cmd
      run: |
        cmake -B build -S salary_calc_Birulevo ^
          -G "Ninja" ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DCMAKE_PREFIX_PATH=%QT_ROOT_DIR%

    - name: Build project
      shell: cmd
      run: cmake --build build --config Release

    - name: Prepare artifact
      shell: pwsh
      run: |
        # Создаём папку для артефакта
        New-Item -ItemType Directory -Force -Path "artifact"

        # Копируем DLL и манифест
        Copy-Item "build/calc_salary.dll" -Destination "artifact/" -ErrorAction SilentlyContinue
        Copy-Item "build/manifest.json" -Destination "artifact/" -ErrorAction SilentlyContinue

        # Копируем зависимые Qt DLL с помощью windeployqt
        $windeployqt = Join-Path $env:QT_ROOT_DIR "bin\windeployqt.exe"
        if (Test-Path $windeployqt) {
          Write-Host "Running windeployqt..."
          & $windeployqt "artifact/calc_salary.dll" --no-translations --no-opengl-sw --no-system-d3d-compiler
        } else {
          Write-Host "⚠️ windeployqt not found, copying Qt DLLs manually..."
          $qtBin = Join-Path $env:QT_ROOT_DIR "bin"
          Copy-Item "$qtBin\Qt6Core.dll" -Destination "artifact/" -ErrorAction SilentlyContinue
          Copy-Item "$qtBin\Qt6Gui.dll" -Destination "artifact/" -ErrorAction SilentlyContinue
          Copy-Item "$qtBin\Qt6Xml.dll" -Destination "artifact/" -ErrorAction SilentlyContinue
        }

        Write-Host "Artifact contents:"
        Get-ChildItem "artifact" -Recurse | ForEach-Object { Write-Host $_.FullName }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: calc-salary-birulevo-windows
        path: artifact/
        retention-days: 30
