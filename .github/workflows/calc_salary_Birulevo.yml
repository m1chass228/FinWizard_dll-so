name: Build Salary Calc Birulevo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:/vcpkg

    steps:
      # 1. Checkout репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Установка vcpkg
      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git %VCPKG_ROOT%
          %VCPKG_ROOT%/bootstrap-vcpkg.bat

      # 3. Установка Qt через vcpkg
      - name: Install Qt6 with vcpkg
        run: |
          %VCPKG_ROOT%/vcpkg install qt6:x64-windows
          %VCPKG_ROOT%/vcpkg install qt6-tools:x64-windows  # опционально, если нужны moc, uic и rcc

      # 4. Настройка CMake с vcpkg
      - name: Configure CMake
        run: |
          cmake -B build -S salary_calc_Birulevo ^
            -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake

      # 5. Сборка проекта
      - name: Build project
        run: cmake --build build --config Release

      # 6. (Опционально) Тесты
      #- name: Run tests
      #  run: ctest --test-dir build --output-on-failure
