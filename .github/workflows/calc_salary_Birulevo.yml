name: Build Windows Plugin (DLL)

on:
  push:
    branches: [ "main", "master", "dev" ]
  workflow_dispatch:

jobs:
  build-plugin:
    runs-on: windows-latest

    steps:
      - name: Скачиваем код плагина
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Устанавливаем Qt 6 (aqtinstall)
        shell: bash
        run: |
          pip install aqtinstall

          # Устанавливаем Qt 6.7.3.
          # Мы НЕ используем флаг --archives, так как --modules qtshadertools qt5compat
          # в 99% случаев подтягивают нужные приватные зависимости автоматически.
          python -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 \
            --outputdir "${{ github.workspace }}/Qt" \
            --modules qtshadertools qt5compat qtdeclarative

          # Настройка переменных окружения (используем формат GITHUB_ENV для надежности)
          QT_PATH="${{ github.workspace }}/Qt/6.7.3/msvc2019_64"
          echo "Qt6_DIR=$QT_PATH" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$QT_PATH" >> $GITHUB_ENV
          echo "QT_PLUGIN_PATH=$QT_PATH/plugins" >> $GITHUB_ENV
          echo "$QT_PATH/bin" >> $GITHUB_PATH

      - name: Проверка путей для CMake
        shell: bash
        run: |
          echo "Ищем конфиги в: $Qt6_DIR/lib/cmake"
          find "$Qt6_DIR/lib/cmake" -name "*GuiPrivate*" || echo "GuiPrivate НЕ НАЙДЕН"

      - name: Настраиваем CMake
        shell: bash
        run: |
          # Используем переменную из GITHUB_ENV
          cmake -B build -S salary_calc_Birulevo \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Компилируем плагин
        shell: bash
        run: cmake --build build --config Release

      - name: Подготавливаем файлы для скачивания
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Plugin_Release

          # Ищем DLL (имя может отличаться, поэтому ищем *.dll в папке build)
          $dllFile = Get-ChildItem -Path build -Filter *.dll -Recurse | Where-Object { $_.FullName -notmatch "3rdparty" } | Select-Object -First 1

          if ($dllFile) {
              Copy-Item $dllFile.FullName -Destination Plugin_Release\
              Write-Host "Found DLL: $($dllFile.FullName)"
          } else {
              Write-Error "Файл DLL не найден в папке build!"
              exit 1
          }

          # Ищем манифест
          $manifest = "salary_calc_Birulevo/manifest.json"
          if (Test-Path $manifest) {
              Copy-Item $manifest -Destination Plugin_Release\
              Write-Host "Found manifest"
          }

      - name: Загружаем готовую DLL на GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Plugin-Windows-DLL
          path: Plugin_Release\
