name: Build Windows Plugin (DLL)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-plugin:
    runs-on: windows-latest

    steps:
      - name: Скачиваем код
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Устанавливаем Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          # Добавляем модули, которые содержат Private заголовки
          modules: 'qtbase qtshadertools'

      - name: Настраиваем CMake
        shell: bash
        # Указываем путь к папке с плагином
        run: cmake -B build -S salary_calc_Birulevo -DCMAKE_BUILD_TYPE=Release

      - name: Компилируем плагин
        shell: bash
        run: cmake --build build --config Release

      - name: Подготавливаем файлы для скачивания
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Plugin_Release

          # Ищем DLL в папке сборки
          $dllFile = Get-ChildItem -Path build -Filter *.dll -Recurse | Select-Object -First 1
          if ($dllFile) {
              Copy-Item $dllFile.FullName -Destination Plugin_Release\
              Write-Host "Found DLL: $($dllFile.FullName)"
          } else {
              Write-Error "Файл DLL не найден!"
              exit 1
          }

          # Ищем манифест конкретно в папке плагина
          $manifest = "salary_calc_Birulevo/manifest.json"
          if (Test-Path $manifest) {
              Copy-Item $manifest -Destination Plugin_Release\
          }

      - name: Загружаем готовую DLL на GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Birulevo-Plugin-Windows
          path: Plugin_Release\
