name: Build Windows Plugin

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      # ---------- INSTALL QT (FAST + CACHE) ----------

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.3
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtshadertools qt5compat
          cache: true

      # ---------- CONFIGURE ----------

      - name: Configure
        shell: bash
        run: |

          cmake -B build -S salary_calc_Birulevo \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      # ---------- BUILD ----------

      - name: Build
        shell: bash
        run: |

          cmake --build build --parallel

      # ---------- ARTIFACT ----------

      - name: Prepare artifact
        shell: pwsh
        run: |

          New-Item -ItemType Directory -Force -Path Plugin_Release

          $dll = Get-ChildItem build -Filter *.dll -Recurse |
            Select-Object -First 1

          if ($dll) {
              Copy-Item $dll.FullName Plugin_Release\
              Write-Host "DLL found: $($dll.FullName)"
          } else {
              Write-Error "DLL not found"
              exit 1
          }

          if (Test-Path "salary_calc_Birulevo/manifest.json") {
              Copy-Item salary_calc_Birulevo/manifest.json Plugin_Release\
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-windows
          path: Plugin_Release\
