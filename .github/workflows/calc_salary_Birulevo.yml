name: Build SalaryCalc Birulevo

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Qt 6.7.3
        run: |
          python -m pip install --upgrade pip aqtinstall
          python -m aqt list-qt windows desktop 6.7.3 win64_msvc2019_64
          python -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 \
            --outputdir D:\a\FinWizard_dll-so\Qt \
            --modules qtbase qt6widgets qt6qml qt5compat

      - name: Configure CMake
        run: |
          cmake -B build -S salary_calc_Birulevo \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="D:\a\FinWizard_dll-so\Qt\6.7.3\msvc2019_64\lib\cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: salary_calc_birulevo
          path: build/Release/
