name: Build SalaryCalc Birulevo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHON_VERSION: 3.12.10

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Install Qt 6.7.3 with private headers
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.3
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtbase qt6gui-private qt6core qt6widgets qt6qml qt5compat
          cache: true

      # 3️⃣ Setup MSVC environment
      - name: Setup MSVC environment
        uses: microsoft/setup-msbuild@v1

      # 4️⃣ Install Python (если нужен)
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # 5️⃣ Configure CMake
      - name: Configure CMake
        run: |
          cmake -B build -S salary_calc_Birulevo \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT }}"

      # 6️⃣ Build project
      - name: Build with Ninja
        run: |
          cmake --build build --config Release --parallel

      # 7️⃣ (Опционально) Copy artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: salary_calc_birulevo
          path: build/Release/
