name: Build Windows Plugin (DLL)

on:
  push:
    branches: [ "main", "master", "dev" ]
  workflow_dispatch:

jobs:
  build-plugin:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: Qt
          key: qt-6.7.3-msvc2019

      - name: Install Qt
        if: steps.cache-qt.outputs.cache-hit != 'true'
        shell: bash
        run: |
          pip install aqtinstall

          python -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 \
            --outputdir "${{ github.workspace }}/Qt"

      - name: Setup Qt env
        shell: bash
        run: |
          QT_PATH="${{ github.workspace }}/Qt/6.7.3/msvc2019_64"

          echo "Qt6_DIR=$QT_PATH" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$QT_PATH" >> $GITHUB_ENV
          echo "$QT_PATH/bin" >> $GITHUB_PATH

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -S salary_calc_Birulevo \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        shell: bash
        run: |
          cmake --build build

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Plugin_Release

          $dllFile = Get-ChildItem -Path build -Filter *.dll -Recurse |
            Where-Object { $_.FullName -notmatch "3rdparty" } |
            Select-Object -First 1

          if ($dllFile) {
              Copy-Item $dllFile.FullName -Destination Plugin_Release\
              Write-Host "Found DLL: $($dllFile.FullName)"
          } else {
              Write-Error "DLL not found!"
              exit 1
          }

          $manifest = "salary_calc_Birulevo/manifest.json"
          if (Test-Path $manifest) {
              Copy-Item $manifest -Destination Plugin_Release\
          }

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: Plugin-Windows-DLL
          path: Plugin_Release\
