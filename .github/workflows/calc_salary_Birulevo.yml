name: Build Salary Calc Birulevo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:/vcpkg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Клонируем vcpkg
      - name: Clone vcpkg
        shell: cmd
        run: |
          git clone https://github.com/microsoft/vcpkg.git %VCPKG_ROOT%
          %VCPKG_ROOT%\bootstrap-vcpkg.bat

      # Устанавливаем Qt6 через vcpkg
      - name: Install Qt6 via vcpkg
        shell: cmd
        run: |
          %VCPKG_ROOT%\vcpkg install qt6:x64-windows
          %VCPKG_ROOT%\vcpkg install qt6-tools:x64-windows

      # Настраиваем CMake
      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -S salary_calc_Birulevo ^
            -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake

      # Сборка проекта
      - name: Build project
        shell: cmd
        run: cmake --build build --config Release
